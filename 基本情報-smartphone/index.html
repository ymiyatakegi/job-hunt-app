<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>基本情報技術者試験対策</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app-shell launcher-shell">
    <section class="hero-card">
      <p class="eyebrow">FE STUDY TOOL</p>
      <h1>基本情報技術者試験対策</h1>
      <p class="hero-text">単語帳を作るページと、テストと記録を回すページを分けた独立アプリです。既存の就活アプリとは別URLで動きます。</p>
      <div class="hero-actions">
        <a class="button primary" href="./words.html">単語帳を作る</a>
        <a class="button secondary" href="./review.html">テスト / 記録</a>
      </div>
    </section>

    <section class="panel-card launcher-grid">
      <article class="nav-card">
        <h2>1. 単語帳アプリ</h2>
        <p>出題範囲、ワード、解説を下に追加していく一覧です。テクノロジ系、マネジメント系、ストラテジ系を2段階で選べます。</p>
        <a class="button primary" href="./words.html">単語帳へ</a>
      </article>
      <article class="nav-card">
        <h2>2. テスト / 記録アプリ</h2>
        <p>単語帳の内容を使ってランダム出題します。正解率や最終回答日を記録し、進捗を棒グラフで見られます。</p>
        <a class="button primary" href="./review.html">テスト / 記録へ</a>
      </article>
    </section>
  </main>
</body>
</html>
