<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>就活企業情報管理 スマホ版</title>
  <style>
    :root {
      --bg: #f6f3ed;
      --surface: #fffdf8;
      --surface-2: #f1eadf;
      --line: #d9b5f8;
      --text: #2c241b;
      --muted: #002877;
      --accent: #0898ff;
      --accent-strong: #0071a9;
      --danger: #c567f7;
      --blue: #e8f2ff;
      --red: #fff0f0;
      --shadow: 0 10px 24px rgba(70, 51, 28, 0.12);
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      color: var(--text);
      background: linear-gradient(180deg, #fbf8f2 0%, var(--bg) 100%);
      font-family: "Yu Gothic UI", "Hiragino Sans", "Meiryo", sans-serif;
      line-height: 1.5;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      min-height: 44px;
      border: 1px solid transparent;
      border-radius: 12px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .app {
      width: min(100%, 720px);
      margin: 0 auto;
      padding: 14px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      margin: -14px -14px 12px;
      padding: 14px;
      background: rgba(246, 243, 237, 0.96);
      border-bottom: 1px solid rgba(216, 201, 180, 0.7);
      backdrop-filter: blur(10px);
    }

    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    h1 {
      margin: 0;
      font-size: 1.35rem;
      line-height: 1.25;
    }

    .status {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.82rem;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 12px;
    }

    .tab {
      min-height: 40px;
      padding: 8px 6px;
      border-color: var(--line);
      background: var(--surface);
      color: var(--muted);
      font-size: 0.9rem;
    }

    .tab.is-active {
      color: #fff;
      border-color: var(--accent);
      background: var(--accent);
    }

    .toolbar {
      display: grid;
      gap: 10px;
      margin-bottom: 12px;
    }

    .search {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      background: var(--surface);
      color: var(--text);
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .primary {
      color: #fff;
      background: var(--accent);
    }

    .secondary {
      color: var(--text);
      border-color: var(--line);
      background: var(--surface);
    }

    .danger {
      color: var(--danger);
      border-color: rgba(180, 35, 24, 0.28);
      background: rgba(180, 35, 24, 0.08);
    }

    .view {
      display: none;
    }

    .view.is-active {
      display: block;
    }

    .card,
    .panel {
      margin-bottom: 12px;
      border: 1px solid rgba(216, 201, 180, 0.78);
      border-radius: 14px;
      background: var(--surface);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      padding: 12px;
      background: var(--surface-2);
    }

    .card-title {
      min-width: 0;
    }

    .card-title h2,
    .card-title p,
    .section-title,
    .empty,
    .event-title,
    .event-meta {
      margin: 0;
    }

    .card-title h2 {
      overflow-wrap: anywhere;
      font-size: 1.1rem;
      line-height: 1.35;
    }

    .card-title p,
    .event-meta {
      color: var(--muted);
      font-size: 0.82rem;
    }

    .card-body {
      padding: 12px;
    }

    details {
      border-top: 1px solid rgba(216, 201, 180, 0.58);
    }

    details:first-child {
      border-top: 0;
    }

    summary {
      min-height: 44px;
      padding: 12px;
      color: var(--accent-strong);
      font-weight: 700;
      cursor: pointer;
      list-style-position: inside;
    }

    .fields {
      display: grid;
      gap: 10px;
      padding: 0 12px 12px;
    }

    label {
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 700;
    }

    textarea,
    input,
    select {
      width: 100%;
      border: 1px solid rgba(216, 201, 180, 0.95);
      border-radius: 12px;
      padding: 10px 11px;
      background: #fffefb;
      color: var(--text);
    }

    textarea {
      min-height: 84px;
      resize: vertical;
      line-height: 1.55;
    }

    .short textarea {
      min-height: 52px;
    }

    .long textarea {
      min-height: 132px;
    }

    .links {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }

    .link-button {
      display: inline-flex;
      min-height: 40px;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(15, 118, 110, 0.28);
      border-radius: 12px;
      padding: 8px 10px;
      color: var(--accent-strong);
      background: rgba(15, 118, 110, 0.08);
      font-size: 0.88rem;
      font-weight: 700;
      text-decoration: none;
    }

    .copy-button {
      width: 100%;
      margin-top: 8px;
    }

    .panel {
      padding: 12px;
    }

    .section-title {
      font-size: 1.05rem;
      margin-bottom: 10px;
    }

    .schedule-nav {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }

    .month {
      min-width: 7.5em;
      text-align: center;
      font-weight: 700;
    }

    .event-list {
      display: grid;
      gap: 8px;
    }

    .calendar {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 4px;
      margin-bottom: 12px;
    }

    .weekday {
      padding: 6px 0;
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 700;
      text-align: center;
    }

    .day {
      min-height: 78px;
      border: 1px solid rgba(216, 201, 180, 0.82);
      border-radius: 10px;
      padding: 5px;
      background: var(--surface);
      text-align: left;
    }

    .day.is-outside {
      opacity: 0.45;
      background: #eee8de;
    }

    .day.is-today {
      border-color: var(--accent);
      box-shadow: inset 0 0 0 1px rgba(15, 118, 110, 0.24);
    }

    .day-number {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 3px;
      margin-bottom: 4px;
      font-size: 0.78rem;
      font-weight: 700;
    }

    .day-add {
      width: 22px;
      min-height: 22px;
      border-radius: 999px;
      padding: 0;
      color: var(--accent-strong);
      border-color: rgba(15, 118, 110, 0.25);
      background: rgba(15, 118, 110, 0.08);
      line-height: 1;
    }

    .day-events {
      display: grid;
      gap: 3px;
    }

    .day-event {
      width: 100%;
      min-height: 22px;
      border: 0;
      border-radius: 6px;
      padding: 2px 4px;
      color: #fff;
      font-size: 0.68rem;
      font-weight: 700;
      text-align: left;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .more-events {
      margin: 1px 0 0;
      color: var(--muted);
      font-size: 0.68rem;
      font-weight: 700;
    }

    .event {
      border-left: 6px solid var(--accent);
      border-radius: 12px;
      padding: 10px;
      background: var(--blue);
    }

    .event-title {
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .event-note {
      margin: 6px 0 0;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      font-size: 0.9rem;
    }

    .event-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: flex;
      align-items: flex-end;
      padding: 14px;
      background: rgba(44, 36, 27, 0.42);
    }

    .modal.is-hidden {
      display: none;
    }

    .modal-card {
      width: 100%;
      max-height: calc(100vh - 28px);
      overflow: auto;
      border-radius: 16px;
      background: var(--surface);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.24);
    }

    .modal-head,
    .modal-body,
    .modal-actions {
      padding: 12px;
    }

    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border-bottom: 1px solid var(--line);
      background: var(--surface-2);
    }

    .modal-head h2 {
      margin: 0;
      font-size: 1.08rem;
    }

    .modal-body {
      display: grid;
      gap: 10px;
    }

    .modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      border-top: 1px solid var(--line);
    }

    .empty {
      padding: 20px 12px;
      color: var(--muted);
      text-align: center;
    }

    @media (min-width: 680px) {
      .tabs {
        grid-template-columns: repeat(5, 1fr);
      }

      .button-row,
      .links,
      .event-actions {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .calendar {
        gap: 6px;
      }

      .day {
        min-height: 96px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="title-row">
        <div>
          <h1>就活管理 スマホ版</h1>
          <p id="status" class="status">保存済み</p>
        </div>
      </div>
      <nav class="tabs" aria-label="表示切り替え">
        <button class="tab is-active" type="button" data-view="companies">企業</button>
        <button class="tab" type="button" data-view="schedule">予定</button>
        <button class="tab" type="button" data-view="sites">サイト</button>
      </nav>
    </header>

    <section id="companies" class="view is-active">
      <div class="toolbar">
        <input id="companySearch" class="search" type="search" placeholder="企業名で検索">
        <div class="button-row">
          <button id="addCompany" class="primary" type="button">企業を追加</button>
          <button id="resetCompanies" class="secondary" type="button">企業を全消去</button>
        </div>
      </div>
      <div id="companyList"></div>
    </section>

    <section id="schedule" class="view">
      <div class="panel">
        <h2 class="section-title">月ごとの予定</h2>
        <div class="schedule-nav">
          <button id="prevMonth" class="secondary" type="button">前の月</button>
          <div id="monthLabel" class="month"></div>
          <button id="nextMonth" class="secondary" type="button">次の月</button>
        </div>
        <button id="addEvent" class="primary" type="button">予定を追加</button>
      </div>
      <div id="calendarGrid" class="calendar"></div>
      <div id="eventList" class="event-list"></div>
    </section>

    <section id="sites" class="view">
      <div class="toolbar">
        <div class="button-row">
          <button id="addSite" class="primary" type="button">サイトを追加</button>
          <button id="resetSites" class="secondary" type="button">サイトを全消去</button>
        </div>
      </div>
      <div id="siteList"></div>
    </section>
  </main>

  <div id="eventModal" class="modal is-hidden" aria-hidden="true">
    <form id="eventForm" class="modal-card">
      <div class="modal-head">
        <h2 id="modalTitle">予定を追加</h2>
        <button id="closeModal" class="secondary" type="button">閉じる</button>
      </div>
      <div class="modal-body">
        <label>
          日付
          <input id="eventDate" type="date" required>
        </label>
        <label>
          種別
          <select id="eventCategory" required></select>
        </label>
        <label>
          予定名
          <input id="eventTitle" type="text" required placeholder="例: ○○商事 ES提出">
        </label>
        <label>
          メモ
          <textarea id="eventNote" placeholder="詳細や持ち物など"></textarea>
        </label>
      </div>
      <div class="modal-actions">
        <button id="deleteEvent" class="danger" type="button">削除</button>
        <button class="primary" type="submit">保存</button>
      </div>
    </form>
  </div>

  <script>
    const STORAGE_KEY = "job-hunt-company-sheet-v4";
    const SCHEDULE_STORAGE_KEY = "job-hunt-month-schedule-v1";
    const SITE_STORAGE_KEY = "job-hunt-site-list-v1";

    const columns = [
      { key: "companyName", label: "企業名", short: true },
      { key: "recruitPage", label: "採用ページ", url: true, short: true },
      { key: "userName", label: "ユーザー名", short: true, copy: true },
      { key: "motivation", label: "志望動機", long: true },
      { key: "homePage", label: "ホームページ", url: true, short: true },
      { key: "salary", label: "年収", short: true },
      { key: "averageTenure", label: "平均勤続年数", short: true },
      { key: "companySize", label: "企業規模", short: true },
      { key: "business", label: "事業内容", long: true },
      { key: "internDeadline", label: "インターン締め切り", short: true },
      { key: "mynavi", label: "マイナビ", url: true, short: true },
      { key: "oneCareer", label: "ワンキャリ", url: true, short: true },
      { key: "internFlow", label: "インターン選考フロー" },
      { key: "postInternFlow", label: "インターン後選考フロー" },
      { key: "mainFlow", label: "本選考フロー" },
      { key: "es1", label: "ES質問1", es: true },
      { key: "es2", label: "ES質問2", es: true },
      { key: "es3", label: "ES質問3", es: true }
    ];

    const siteColumns = [
      { key: "siteName", label: "サイト名", short: true },
      { key: "siteUrl", label: "URL", url: true, short: true },
      { key: "siteDetail", label: "サイト詳細", long: true }
    ];

    const scheduleCategories = [
      { value: "es-lg", label: "ES締め切り(大)", color: "#d1495b" },
      { value: "es-md", label: "ES締め切り(中)", color: "#f08a5d" },
      { value: "es-sm", label: "ES締め切り(小)", color: "#f6bd60" },
      { value: "test", label: "テスト締め切り", color: "#6d597a" },
      { value: "interview", label: "面接", color: "#2a9d8f" },
      { value: "briefing", label: "企業説明", color: "#457b9d" },
      { value: "sponsor", label: "協賛", color: "#b56576" },
      { value: "advisor", label: "アドバイザー", color: "#7f5539" },
      { value: "other", label: "その他", color: "#6c757d" }
    ];

    const companyList = document.getElementById("companyList");
    const siteList = document.getElementById("siteList");
    const calendarGrid = document.getElementById("calendarGrid");
    const eventList = document.getElementById("eventList");
    const statusNode = document.getElementById("status");
    const companySearch = document.getElementById("companySearch");
    const monthLabel = document.getElementById("monthLabel");
    const eventModal = document.getElementById("eventModal");
    const eventForm = document.getElementById("eventForm");
    const eventDate = document.getElementById("eventDate");
    const eventCategory = document.getElementById("eventCategory");
    const eventTitle = document.getElementById("eventTitle");
    const eventNote = document.getElementById("eventNote");
    const modalTitle = document.getElementById("modalTitle");
    const deleteEventButton = document.getElementById("deleteEvent");

    let rows = loadRows();
    let siteRows = loadSiteRows();
    let schedules = loadSchedules();
    let currentMonth = new Date();
    let editingEventId = null;
    let query = "";

    currentMonth.setDate(1);
    init();

    function init() {
      document.querySelectorAll(".tab").forEach((tab) => {
        tab.addEventListener("click", () => switchView(tab.dataset.view));
      });

      document.getElementById("addCompany").addEventListener("click", () => {
        rows.unshift(emptyRow());
        saveRows();
        renderCompanies();
      });

      document.getElementById("resetCompanies").addEventListener("click", () => {
        if (!confirm("企業情報をすべて削除します。よろしいですか？")) return;
        rows = [emptyRow()];
        saveRows();
        renderCompanies();
      });

      document.getElementById("addSite").addEventListener("click", () => {
        siteRows.unshift(emptySiteRow());
        saveSiteRows();
        renderSites();
      });

      document.getElementById("resetSites").addEventListener("click", () => {
        if (!confirm("サイト情報をすべて削除します。よろしいですか？")) return;
        siteRows = [emptySiteRow()];
        saveSiteRows();
        renderSites();
      });

      companySearch.addEventListener("input", (event) => {
        query = event.target.value.trim().toLowerCase();
        renderCompanies();
      });

      document.getElementById("prevMonth").addEventListener("click", () => {
        currentMonth.setMonth(currentMonth.getMonth() - 1);
        renderSchedule();
      });

      document.getElementById("nextMonth").addEventListener("click", () => {
        currentMonth.setMonth(currentMonth.getMonth() + 1);
        renderSchedule();
      });

      document.getElementById("addEvent").addEventListener("click", () => {
        openEventModal(formatDate(new Date()));
      });

      document.getElementById("closeModal").addEventListener("click", closeEventModal);

      eventModal.addEventListener("click", (event) => {
        if (event.target === eventModal) closeEventModal();
      });

      eventForm.addEventListener("submit", (event) => {
        event.preventDefault();
        const item = {
          id: editingEventId || String(Date.now()),
          date: eventDate.value,
          category: eventCategory.value,
          title: eventTitle.value.trim(),
          note: eventNote.value.trim()
        };
        if (!item.title) return;
        if (editingEventId) {
          schedules = schedules.map((schedule) => schedule.id === editingEventId ? item : schedule);
        } else {
          schedules.push(item);
        }
        saveSchedules();
        closeEventModal();
        renderSchedule();
      });

      deleteEventButton.addEventListener("click", () => {
        if (!editingEventId) return;
        schedules = schedules.filter((schedule) => schedule.id !== editingEventId);
        saveSchedules();
        closeEventModal();
        renderSchedule();
      });

      scheduleCategories.forEach((category) => {
        const option = document.createElement("option");
        option.value = category.value;
        option.textContent = category.label;
        eventCategory.appendChild(option);
      });

      renderCompanies();
      renderSchedule();
      renderSites();
    }

    function switchView(id) {
      document.querySelectorAll(".tab").forEach((tab) => {
        tab.classList.toggle("is-active", tab.dataset.view === id);
      });
      document.querySelectorAll(".view").forEach((view) => {
        view.classList.toggle("is-active", view.id === id);
      });
    }

    function renderCompanies() {
      companyList.innerHTML = "";
      const visibleRows = rows
        .map((row, index) => ({ row, index }))
        .filter((item) => !query || String(item.row.companyName || "").toLowerCase().includes(query));

      if (visibleRows.length === 0) {
        companyList.appendChild(emptyMessage("該当する企業がありません。"));
        return;
      }

      visibleRows.forEach(({ row, index }) => {
        const card = document.createElement("article");
        card.className = "card";

        const head = document.createElement("div");
        head.className = "card-head";
        head.innerHTML = '<div class="card-title"><h2 data-company-title="' + index + '">' + escapeHtml(row.companyName || "企業名未入力") + '</h2><p>' + (index + 1) + '件目</p></div>';

        const remove = document.createElement("button");
        remove.className = "danger";
        remove.type = "button";
        remove.textContent = "削除";
        remove.addEventListener("click", () => {
          if (!confirm("この企業を削除しますか？")) return;
          rows.splice(index, 1);
          if (rows.length === 0) rows = [emptyRow()];
          saveRows();
          renderCompanies();
        });
        head.appendChild(remove);
        card.appendChild(head);

        const body = document.createElement("div");
        body.className = "card-body";
        body.appendChild(renderQuickLinks(row, index));
        card.appendChild(body);

        card.appendChild(renderFieldGroup("基本情報", row, index, columns.slice(0, 10)));
        card.appendChild(renderFieldGroup("就活サイト・選考", row, index, columns.slice(10, 15)));
        card.appendChild(renderFieldGroup("ES", row, index, columns.slice(15)));
        companyList.appendChild(card);
      });
    }

    function renderQuickLinks(row, rowIndex) {
      const wrap = document.createElement("div");
      wrap.className = "links";
      [
        { key: "recruitPage", label: "採用ページ" },
        { key: "homePage", label: "HP" },
        { key: "mynavi", label: "マイナビ" },
        { key: "oneCareer", label: "ワンキャリ" }
      ].forEach((item) => {
        const href = normalizeUrl(row[item.key]);
        if (!href) return;
        const link = document.createElement("a");
        link.className = "link-button";
        link.href = href;
        link.target = "_blank";
        link.rel = "noreferrer noopener";
        link.textContent = item.label;
        if (item.key === "recruitPage") {
          link.addEventListener("click", () => {
            rows[rowIndex].recruitPageLastOpened = new Date().toLocaleString("ja-JP");
            saveRows();
          });
        }
        wrap.appendChild(link);
      });
      return wrap;
    }

    function renderFieldGroup(title, row, rowIndex, groupColumns) {
      const details = document.createElement("details");
      details.open = title === "基本情報";
      const summary = document.createElement("summary");
      summary.textContent = title;
      details.appendChild(summary);

      const fields = document.createElement("div");
      fields.className = "fields";
      groupColumns.forEach((column) => {
        fields.appendChild(column.es ? renderEsField(row, rowIndex, column) : renderTextField(row, rowIndex, column));
      });
      details.appendChild(fields);
      return details;
    }

    function renderTextField(row, rowIndex, column) {
      const label = document.createElement("label");
      if (column.short) label.classList.add("short");
      if (column.long) label.classList.add("long");
      label.textContent = column.label;

      const textarea = document.createElement("textarea");
      textarea.value = row[column.key] || "";
      textarea.addEventListener("input", (event) => {
        rows[rowIndex][column.key] = event.target.value;
        saveRows();
        if (column.key === "companyName") {
          updateCompanyTitle(rowIndex, event.target.value);
        }
      });
      label.appendChild(textarea);

      if (column.copy) {
        const copy = document.createElement("button");
        copy.className = "secondary copy-button";
        copy.type = "button";
        copy.textContent = "コピー";
        copy.addEventListener("click", async () => {
          const value = textarea.value.trim();
          if (!value) return;
          try {
            await navigator.clipboard.writeText(value);
            copy.textContent = "コピー済み";
          } catch (error) {
            copy.textContent = "コピー失敗";
          }
          setTimeout(() => copy.textContent = "コピー", 1200);
        });
        label.appendChild(copy);
      }

      return label;
    }

    function renderEsField(row, rowIndex, column) {
      ensureEsShape(row, column.key);
      const wrap = document.createElement("div");
      wrap.className = "fields";

      const question = document.createElement("label");
      question.textContent = column.label + " 質問";
      const questionArea = document.createElement("textarea");
      questionArea.value = row[column.key].question || "";
      questionArea.addEventListener("input", (event) => {
        ensureEsShape(rows[rowIndex], column.key);
        rows[rowIndex][column.key].question = event.target.value;
        saveRows();
      });
      question.appendChild(questionArea);

      const answer = document.createElement("label");
      answer.className = "long";
      answer.textContent = column.label + " 内容";
      const answerArea = document.createElement("textarea");
      answerArea.value = row[column.key].answer || "";
      answerArea.addEventListener("input", (event) => {
        ensureEsShape(rows[rowIndex], column.key);
        rows[rowIndex][column.key].answer = event.target.value;
        saveRows();
      });
      answer.appendChild(answerArea);

      wrap.appendChild(question);
      wrap.appendChild(answer);
      return wrap;
    }

    function renderSchedule() {
      calendarGrid.innerHTML = "";
      eventList.innerHTML = "";
      monthLabel.textContent = currentMonth.getFullYear() + "年" + String(currentMonth.getMonth() + 1).padStart(2, "0") + "月";

      const monthEvents = schedules
        .filter((item) => {
          const date = new Date(item.date + "T00:00:00");
          return date.getFullYear() === currentMonth.getFullYear() && date.getMonth() === currentMonth.getMonth();
        })
        .sort((a, b) => a.date.localeCompare(b.date));

      renderCalendarGrid();

      if (monthEvents.length === 0) {
        eventList.appendChild(emptyMessage("この月の予定はありません。"));
        return;
      }

      monthEvents.forEach((item) => {
        const meta = categoryMeta(item.category);
        const node = document.createElement("article");
        node.className = "event";
        node.style.borderLeftColor = meta.color;
        node.innerHTML =
          '<p class="event-title">' + escapeHtml(item.title) + '</p>' +
          '<p class="event-meta">' + escapeHtml(formatDateLabel(item.date)) + ' / ' + escapeHtml(meta.label) + '</p>' +
          (item.note ? '<p class="event-note">' + escapeHtml(item.note) + '</p>' : "");

        const actions = document.createElement("div");
        actions.className = "event-actions";
        const edit = document.createElement("button");
        edit.className = "secondary";
        edit.type = "button";
        edit.textContent = "編集";
        edit.addEventListener("click", () => openEventModal(item.date, item));
        const remove = document.createElement("button");
        remove.className = "danger";
        remove.type = "button";
        remove.textContent = "削除";
        remove.addEventListener("click", () => {
          schedules = schedules.filter((schedule) => schedule.id !== item.id);
          saveSchedules();
          renderSchedule();
        });
        actions.appendChild(edit);
        actions.appendChild(remove);
        node.appendChild(actions);
        eventList.appendChild(node);
      });
    }

    function renderCalendarGrid() {
      ["日", "月", "火", "水", "木", "金", "土"].forEach((weekday) => {
        const node = document.createElement("div");
        node.className = "weekday";
        node.textContent = weekday;
        calendarGrid.appendChild(node);
      });

      const firstDay = new Date(currentMonth.getFullYear(), currentMonth.getMonth(), 1);
      const startDate = new Date(firstDay);
      startDate.setDate(firstDay.getDate() - firstDay.getDay());
      const totalCells = needsSixRows(startDate) ? 42 : 35;

      for (let index = 0; index < totalCells; index += 1) {
        const date = new Date(startDate);
        date.setDate(startDate.getDate() + index);
        calendarGrid.appendChild(createDayCell(date));
      }
    }

    function createDayCell(date) {
      const dateValue = formatDate(date);
      const dayEvents = schedules
        .filter((item) => item.date === dateValue)
        .sort((a, b) => a.title.localeCompare(b.title, "ja"));

      const cell = document.createElement("div");
      cell.className = "day";
      if (date.getMonth() !== currentMonth.getMonth()) cell.classList.add("is-outside");
      if (isSameDate(date, new Date())) cell.classList.add("is-today");

      const top = document.createElement("div");
      top.className = "day-number";
      const number = document.createElement("span");
      number.textContent = String(date.getDate());
      const add = document.createElement("button");
      add.className = "day-add";
      add.type = "button";
      add.textContent = "+";
      add.setAttribute("aria-label", formatDateLabel(dateValue) + "に予定を追加");
      add.addEventListener("click", () => openEventModal(dateValue));
      top.appendChild(number);
      top.appendChild(add);
      cell.appendChild(top);

      const events = document.createElement("div");
      events.className = "day-events";
      dayEvents.slice(0, 2).forEach((item) => {
        const meta = categoryMeta(item.category);
        const chip = document.createElement("button");
        chip.className = "day-event";
        chip.type = "button";
        chip.style.background = meta.color;
        chip.textContent = item.title;
        chip.title = meta.label + " / " + item.title;
        chip.addEventListener("click", () => openEventModal(item.date, item));
        events.appendChild(chip);
      });

      if (dayEvents.length > 2) {
        const more = document.createElement("p");
        more.className = "more-events";
        more.textContent = "ほか" + (dayEvents.length - 2) + "件";
        events.appendChild(more);
      }

      cell.appendChild(events);
      return cell;
    }

    function needsSixRows(startDate) {
      const currentMonthIndex = currentMonth.getMonth();
      const rowStart = new Date(startDate);
      rowStart.setDate(startDate.getDate() + 35);
      for (let offset = 0; offset < 7; offset += 1) {
        const checkDate = new Date(rowStart);
        checkDate.setDate(rowStart.getDate() + offset);
        if (checkDate.getMonth() === currentMonthIndex) return true;
      }
      return false;
    }

    function renderSites() {
      siteList.innerHTML = "";
      siteRows.forEach((row, index) => {
        const card = document.createElement("article");
        card.className = "card";
        const head = document.createElement("div");
        head.className = "card-head";
        head.innerHTML = '<div class="card-title"><h2 data-site-title="' + index + '">' + escapeHtml(row.siteName || "サイト名未入力") + '</h2><p>' + (index + 1) + '件目</p></div>';

        const remove = document.createElement("button");
        remove.className = "danger";
        remove.type = "button";
        remove.textContent = "削除";
        remove.addEventListener("click", () => {
          siteRows.splice(index, 1);
          if (siteRows.length === 0) siteRows = [emptySiteRow()];
          saveSiteRows();
          renderSites();
        });
        head.appendChild(remove);
        card.appendChild(head);

        const fields = document.createElement("div");
        fields.className = "fields";
        fields.style.padding = "12px";
        siteColumns.forEach((column) => fields.appendChild(renderSiteField(row, index, column)));
        card.appendChild(fields);
        siteList.appendChild(card);
      });
    }

    function renderSiteField(row, rowIndex, column) {
      const label = document.createElement("label");
      if (column.short) label.classList.add("short");
      if (column.long) label.classList.add("long");
      label.textContent = column.label;

      const textarea = document.createElement("textarea");
      textarea.value = row[column.key] || "";
      textarea.addEventListener("input", (event) => {
        siteRows[rowIndex][column.key] = event.target.value;
        saveSiteRows();
        if (column.key === "siteName") {
          updateSiteTitle(rowIndex, event.target.value);
        }
      });
      label.appendChild(textarea);

      const href = column.url ? normalizeUrl(row[column.key]) : "";
      if (href) {
        const link = document.createElement("a");
        link.className = "link-button";
        link.href = href;
        link.target = "_blank";
        link.rel = "noreferrer noopener";
        link.textContent = "リンクを開く";
        label.appendChild(link);
      }
      return label;
    }

    function updateCompanyTitle(rowIndex, value) {
      const title = companyList.querySelector('[data-company-title="' + rowIndex + '"]');
      if (title) {
        title.textContent = value.trim() || "企業名未入力";
      }
    }

    function updateSiteTitle(rowIndex, value) {
      const title = siteList.querySelector('[data-site-title="' + rowIndex + '"]');
      if (title) {
        title.textContent = value.trim() || "サイト名未入力";
      }
    }

    function openEventModal(dateValue, existing) {
      editingEventId = existing ? existing.id : null;
      modalTitle.textContent = existing ? "予定を編集" : "予定を追加";
      deleteEventButton.style.visibility = existing ? "visible" : "hidden";
      eventDate.value = dateValue;
      eventCategory.value = existing ? existing.category : scheduleCategories[0].value;
      eventTitle.value = existing ? existing.title : "";
      eventNote.value = existing ? existing.note : "";
      eventModal.classList.remove("is-hidden");
      eventModal.setAttribute("aria-hidden", "false");
    }

    function closeEventModal() {
      editingEventId = null;
      eventForm.reset();
      eventModal.classList.add("is-hidden");
      eventModal.setAttribute("aria-hidden", "true");
    }

    function loadRows() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
        if (Array.isArray(saved) && saved.length > 0) {
          return saved.map((item) => {
            const row = emptyRow();
            columns.forEach((column) => {
              if (column.es) {
                const value = item[column.key];
                row[column.key] = {
                  question: value && typeof value === "object" ? value.question || "" : "",
                  answer: value && typeof value === "object" ? value.answer || "" : "",
                  expanded: value && typeof value === "object" ? !!value.expanded : false
                };
              } else {
                row[column.key] = item[column.key] || "";
              }
            });
            row.recruitPageLastOpened = item.recruitPageLastOpened || "";
            return row;
          });
        }
      } catch (error) {
      }
      return [emptyRow()];
    }

    function loadSiteRows() {
      try {
        const saved = JSON.parse(localStorage.getItem(SITE_STORAGE_KEY) || "null");
        if (Array.isArray(saved) && saved.length > 0) {
          return saved.map((item) => {
            const row = emptySiteRow();
            siteColumns.forEach((column) => row[column.key] = item[column.key] || "");
            return row;
          });
        }
      } catch (error) {
      }
      return [emptySiteRow()];
    }

    function loadSchedules() {
      try {
        const saved = JSON.parse(localStorage.getItem(SCHEDULE_STORAGE_KEY) || "[]");
        if (Array.isArray(saved)) {
          return saved.filter((item) => item && item.id && item.date && item.category && item.title).map((item) => ({
            id: String(item.id),
            date: String(item.date),
            category: String(item.category),
            title: String(item.title),
            note: item.note ? String(item.note) : ""
          }));
        }
      } catch (error) {
      }
      return [];
    }

    function emptyRow() {
      const row = {};
      columns.forEach((column) => {
        row[column.key] = column.es ? { question: "", answer: "", expanded: false } : "";
      });
      return row;
    }

    function emptySiteRow() {
      const row = {};
      siteColumns.forEach((column) => row[column.key] = "");
      return row;
    }

    function saveRows() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(rows));
      updateStatus();
    }

    function saveSiteRows() {
      localStorage.setItem(SITE_STORAGE_KEY, JSON.stringify(siteRows));
      updateStatus();
    }

    function saveSchedules() {
      localStorage.setItem(SCHEDULE_STORAGE_KEY, JSON.stringify(schedules));
      updateStatus();
    }

    function updateStatus() {
      statusNode.textContent = "最終保存 " + new Date().toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit" });
    }

    function ensureEsShape(row, key) {
      if (!row[key] || typeof row[key] !== "object") {
        row[key] = { question: "", answer: "", expanded: false };
      }
    }

    function normalizeUrl(value) {
      const trimmed = String(value || "").trim();
      if (!trimmed) return "";
      try {
        const full = /^https?:\/\//i.test(trimmed) ? trimmed : "https://" + trimmed;
        return new URL(full).href;
      } catch (error) {
        return "";
      }
    }

    function categoryMeta(value) {
      return scheduleCategories.find((item) => item.value === value) || scheduleCategories[scheduleCategories.length - 1];
    }

    function formatDate(date) {
      return date.getFullYear() + "-" + String(date.getMonth() + 1).padStart(2, "0") + "-" + String(date.getDate()).padStart(2, "0");
    }

    function formatDateLabel(value) {
      const parts = value.split("-");
      return parts[0] + "年" + parts[1] + "月" + parts[2] + "日";
    }

    function isSameDate(left, right) {
      return left.getFullYear() === right.getFullYear() &&
        left.getMonth() === right.getMonth() &&
        left.getDate() === right.getDate();
    }

    function emptyMessage(text) {
      const node = document.createElement("p");
      node.className = "empty";
      node.textContent = text;
      return node;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }
  </script>
</body>
</html>
