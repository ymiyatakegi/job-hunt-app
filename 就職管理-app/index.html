<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>就職管理</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app-shell">
    <header class="app-header">
      <div>
        <p class="eyebrow">ページ管理アプリ</p>
        <h1>就職管理</h1>
      </div>
      <button class="primary-button" id="exportButton" type="button">バックアップ</button>
    </header>

    <section class="panel" aria-labelledby="sitesTitle">
      <div class="section-heading">
        <h2 id="sitesTitle">サイト一覧</h2>
        <p>就活で使うURLをまとめて管理できます。</p>
      </div>
      <div class="site-grid" id="siteGrid"></div>
    </section>

    <section class="panel data-panel" aria-labelledby="dataTitle">
      <div class="section-heading">
        <h2 id="dataTitle">データ管理欄</h2>
        <p>エクスプローラーからファイルをドラッグして保存できます。</p>
      </div>
      <div class="category-grid" id="categoryGrid"></div>
    </section>
  </main>

  <template id="siteTemplate">
    <article class="site-card">
      <label>
        <span>サイト名</span>
        <input class="site-name" type="text" placeholder="例: マイナビ">
      </label>
      <label>
        <span>サイトURL</span>
        <input class="site-url" type="url" placeholder="https://example.com">
      </label>
      <div class="site-actions">
        <a class="open-link" href="#" target="_blank" rel="noreferrer">開く</a>
        <button class="danger-button delete-site" type="button">削除</button>
      </div>
    </article>
  </template>

  <template id="addSiteTemplate">
    <button class="add-site" type="button">
      <span>＋</span>
      サイトを追加
    </button>
  </template>

  <template id="categoryTemplate">
    <section class="category-card">
      <div class="category-header">
        <h3></h3>
        <span class="file-count">0件</span>
      </div>
      <label class="drop-zone">
        <input class="file-input" type="file" multiple>
        <span class="drop-title">ここにドラッグ</span>
        <span class="drop-note">またはクリックして選択</span>
      </label>
      <div class="file-list"></div>
    </section>
  </template>

  <template id="fileTemplate">
    <article class="file-item">
      <div class="file-main">
        <input class="file-name" type="text" aria-label="保存名">
        <span class="file-meta"></span>
      </div>
      <div class="file-actions">
        <button class="ghost-button open-file" type="button">開く</button>
        <button class="danger-button delete-file" type="button">削除</button>
      </div>
    </article>
  </template>

  <script src="./app.js"></script>
</body>
</html>
